name: Test and deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scrabble-production
  cancel-in-progress: false

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build solver
        run: >
          c++ -std=c++17 -O3
          backend/src/main.cpp
          -o backend/src/gaddag_solver

      - name: Run backend tests
        env:
          PYTHONPATH: backend/src
        run: python backend/src/test_api.py

      - name: Type-check frontend
        run: frontend/node_modules/.bin/tsc -p frontend/tsconfig.json --noEmit

      - name: Build frontend
        run: npm --prefix frontend run build

  deploy:
    name: Deploy production
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure deployment SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/scrabble_deploy
          chmod 600 ~/.ssh/scrabble_deploy
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -i ~/.ssh/scrabble_deploy \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST"

      - name: Verify public application
        run: |
          curl \
            --fail \
            --show-error \
            --retry 5 \
            --retry-delay 2 \
            https://play.debarro.dev/api/health